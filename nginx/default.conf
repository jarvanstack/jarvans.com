server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    gzip on;
    gzip_vary on;
    gzip_min_length 256;
    gzip_types text/plain text/css text/markdown application/javascript application/json;

    # Versioned application dependencies are immutable and can be cached for a
    # year. They are served locally so the first render does not depend on an
    # overseas CDN being reachable.
    location ^~ /vendor/ {
        add_header Cache-Control "public, max-age=31536000, immutable" always;
        try_files $uri =404;
    }

    # Docsify fetches Markdown in the browser. Force revalidation so a normal
    # refresh sees newly deployed content instead of a heuristic browser cache.
    location ~* \.(?:html|md)$ {
        default_type text/markdown;
        add_header Cache-Control "no-cache, must-revalidate" always;
        try_files $uri =404;
    }

    # Do not let the retired service worker remain cached by old clients.
    location = /sw.js {
        add_header Cache-Control "no-store, max-age=0" always;
        try_files $uri =404;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
